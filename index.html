<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>디자인하는삼촌 Admin Dashboard</title>
  <style>
    :root {
      --background: #050506;
      --card: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --accent: #007aff;
      --line: rgba(255, 255, 255, 0.2);
      --shadow:
        0 18px 40px rgba(0, 0, 0, 0.52),
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      --shadow-hover:
        0 26px 52px rgba(0, 0, 0, 0.58),
        0 0 28px rgba(88, 166, 255, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        inset 0 -1px 0 rgba(255, 255, 255, 0.1);
      --radius: 22px;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Display",
        "SF Pro Text",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        "Segoe UI",
        sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--background);
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 24%, rgba(52, 120, 255, 0.28), transparent 22rem),
        radial-gradient(circle at 86% 18%, rgba(157, 92, 255, 0.2), transparent 20rem),
        radial-gradient(circle at 72% 82%, rgba(0, 212, 255, 0.12), transparent 18rem),
        #050506;
      background-attachment: fixed;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      content: "";
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(255, 255, 255, 0.55) 0 1px, transparent 1.2px),
        radial-gradient(circle, rgba(117, 178, 255, 0.42) 0 1px, transparent 1.4px);
      background-position:
        0 0,
        34px 28px,
        77px 54px;
      background-size:
        82px 82px,
        128px 128px,
        174px 174px;
      opacity: 0.5;
    }

    button,
    a {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100%, 1080px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 72px 32px 48px;
    }

    .header {
      margin-bottom: 46px;
    }

    .logo {
      display: block;
      width: min(360px, 74vw);
      height: auto;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(132px, 1fr));
      gap: 16px;
    }

    .admin-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      aspect-ratio: 1 / 1;
      min-height: 132px;
      padding: 18px;
      overflow: hidden;
      color: var(--text);
      text-align: center;
      text-decoration: none;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        border-color 180ms ease,
        background-color 180ms ease;
    }

    .admin-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.36);
      box-shadow: var(--shadow-hover);
    }

    .admin-card:active {
      transform: scale(0.985);
      box-shadow:
        0 12px 26px rgba(0, 0, 0, 0.48),
        inset 0 2px 8px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
    }

    .admin-card:focus-visible {
      outline: 4px solid rgba(0, 122, 255, 0.22);
      outline-offset: 3px;
      border-color: rgba(0, 122, 255, 0.5);
    }

    .copy {
      position: relative;
      width: 100%;
      min-width: 0;
    }

    .title {
      display: block;
      margin-bottom: 6px;
      word-break: keep-all;
      overflow-wrap: break-word;
      color: var(--text);
      font-size: 16px;
      font-weight: 740;
      line-height: 1.32;
      text-wrap: balance;
    }

    .description {
      display: block;
      word-break: keep-all;
      overflow-wrap: break-word;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
      text-wrap: balance;
    }

    @media (max-width: 900px) {
      .page {
        padding-top: 52px;
      }

      .link-grid {
        grid-template-columns: repeat(3, minmax(120px, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 42px 16px 30px;
      }

      .header {
        margin-bottom: 28px;
      }

      .logo {
        width: min(260px, 70vw);
      }

      .link-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .admin-card {
        min-height: 0;
        padding: 14px;
        border-radius: 19px;
      }

      .title {
        font-size: 14px;
      }

      .description {
        margin-top: 6px;
        font-size: 11px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="TheDesignUncle 관리자 대시보드">
    <header class="header">
      <img class="logo" src="assets/typelogo-white.png" alt="TheDesignUncle">
    </header>

    <section class="link-grid" id="admin-links" aria-label="관리자 링크"></section>
  </main>

  <script>
    // 링크를 새 창으로 열려면 "_blank", 현재 창에서 열려면 "_self"로 변경하세요.
    const linkTarget = "_blank";

    // 버튼 링크는 아래 url 값을 실제 주소로 바꾸면 됩니다.
    // 예: url: "https://example.com"
    const adminLinks = [
      {
        title: "SIGNAGE OS 관리자",
        description: "사이니지 운영 관리",
        // https://signage.thedesignuncle.com/admin.html
        url: "https://signage.thedesignuncle.com/admin.html"
      },
      {
        title: "공용 라이선스 관리",
        description: "라이선스 발급 및 확인",
        // https://zumurf-ux.github.io/gosione-license-admin
        url: "https://zumurf-ux.github.io/gosione-license-admin"
      },
      {
        title: "고시ONE 다운로드",
        description: "고시원 관련 앱 다운로드",
        // https://gosione.thedesignuncle.com
        url: "https://gosione.thedesignuncle.com"
      },
      {
        title: "인건비서 앱 다운로드",
        description: "인건비서 앱 설치 링크",
        // https://gosione.thedesignuncle.com
        url: "https://gosione.thedesignuncle.com"
      },
      {
        title: "TheDesignUncle 통합 관리 시스템",
        description: "통합 관리자 시스템",
        // https://zumurf-ux.github.io/management
        url: "https://zumurf-ux.github.io/management"
      },
      {
        title: "디자인하는삼촌 모바일 포트폴리오",
        description: "포트폴리오 바로가기",
        // http://portfolio.thedesignuncle.com
        url: "http://portfolio.thedesignuncle.com"
      },
      {
        title: "구독관리 · 사이니지 관리자",
        description: "구독 및 사이니지 관리",
        // https://zumurf-ux.github.io/subscription
        url: "https://zumurf-ux.github.io/subscription"
      }
    ];

    const linksContainer = document.querySelector("#admin-links");

    linksContainer.innerHTML = adminLinks
      .map((item) => {
        const targetAttributes = linkTarget === "_blank"
          ? 'target="_blank" rel="noopener noreferrer"'
          : 'target="_self"';

        return `
          <a class="admin-card" href="${item.url}" ${targetAttributes} aria-label="${item.title}: ${item.description}">
            <span class="copy">
              <span class="title">${item.title}</span>
              <span class="description">${item.description}</span>
            </span>
          </a>
        `;
      })
      .join("");
  </script>
</body>
</html>
